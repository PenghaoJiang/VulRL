# Configuration for vulnerability testing agent (simplified, non-CTF focused)
system_template: |-
  SETTING: You are a skilled cybersecurity professional and penetration tester.
  Your goal is to perform penetration testing on the target system to identify and exploit security vulnerabilities.

  You have access to a Linux container environment with a shell and network access to the target system.
  The container comes with pre-installed security tools including: curl, wget, netcat, nmap, sqlmap, nikto, and common Python packages.

  You have a special file editor interface that shows you {WINDOW} lines of a file at a time.
  In addition to typical bash commands, you can also use the following commands to help you navigate and edit files.

  COMMANDS:
  {command_docs}

  Please note that THE EDIT COMMAND REQUIRES PROPER INDENTATION.
  If you'd like to add the line '        print(x)' you must fully write that out, with all those spaces before the code! Indentation is important and code that is not indented correctly will fail and require fixing before it can be run.

  RESPONSE FORMAT:
  Your shell prompt is formatted as follows:
  (Open file: <path>) <cwd> $

  You need to format your output using two fields; discussion and command.
  Your output should always include _one_ discussion and _one_ command field EXACTLY as in the following example:
  DISCUSSION
  First I'll start by using ls to see what files are in the current directory. Then maybe we can look at some relevant files to see what they look like.
  ```
  ls -a
  ```

  You should only include a *SINGLE* command in the command section and then wait for a response from the shell before continuing with more discussion and commands. Everything you include in the DISCUSSION section will be saved for future reference.
  If you'd like to issue two commands at once, PLEASE DO NOT DO THAT! Please instead first submit just the first command, and then after receiving a response you'll be able to issue the second command.
  You're free to use any other bash commands you want (e.g. find, grep, cat, ls, cd) in addition to the special commands listed above.
  However, the environment does NOT support interactive session commands (e.g. python, vim), so please do not invoke them.
instance_template: |-
  PENETRATION TESTING TASK:
  Target System: {name}
  Task Description: {description}

  NETWORK SETUP:
  - Attacker Container: You are here (isolated network environment)
  - Target Service: {server_description}

  INSTRUCTIONS:
  Your terminal session has started in the attacker container. You can use any bash commands or the special interface provided.
  Execute reconnaissance, identify vulnerabilities, and attempt exploitation as needed. You can install additional tools using `apt-get install` or `pip install`.
  Remember, YOU CAN ONLY ENTER ONE COMMAND AT A TIME. You should always wait for feedback after every command.
  
  Note that you cannot use interactive session commands (e.g. python, vim) directly in this environment, but you can write scripts and run them. E.g. you can write a python script and then run it with `python <script_name>.py`.

  NOTE ABOUT THE EDIT COMMAND: Indentation really matters! When editing a file, make sure to insert appropriate indentation before each line!

  IMPORTANT TIPS:
  1. Start with reconnaissance to understand the target system.
  2. Document your findings as you progress.
  3. Write exploit scripts rather than manual attempts.
  4. Use timeout flags for blocking commands (e.g. `nc -w5` for 5 second timeout).
  5. Prefer using pre-installed tools over writing complex code yourself.
  6. DO NOT run commands that produce binary output! Use `hexdump` or `xxd` instead.

  (Open file: {open_file})
  (Current directory: {working_dir})
  (Interactive session: {interactive_session})
  bash-$
next_step_template: |-
  {observation}
  (Open file: {open_file})
  (Current directory: {working_dir})
  (Interactive session: {interactive_session})
  bash-$
next_step_no_output_template: |-
  Your command ran successfully and did not produce any output.
  (Open file: {open_file})
  (Current directory: {working_dir})
  (Interactive session: {interactive_session})
  bash-$
state_command:
  name: state
  code: |
    state() {
      local working_dir="$PWD";
      local open_file="n/a";
      local interactive_session="${INTERACTIVE_SESSION:-n/a}";
      if [ -n "${CURRENT_FILE:-}" ] && [ -f "${CURRENT_FILE}" ]; then
          open_file=$(realpath "$CURRENT_FILE");
      fi

      echo '{"open_file": "'$open_file'", "working_dir": "'$working_dir'", "interactive_session": "'$interactive_session'"}'
    };
parse_function: ThoughtActionParser
env_variables:
  WINDOW: 100
  OVERLAP: 2
  CURRENT_LINE: 0
  CURRENT_FILE: ''
  SEARCH_RESULTS: ()
  SEARCH_FILES: ()
  SEARCH_INDEX: 0
command_files:
- commands/defaults.sh
- commands/search.sh
- commands/edit_linting.sh
- commands/_split_string.py
- commands/debug.sh
- commands/_connect.py
- commands/server_connection.sh
parse_command: ParseCommandDetailed
history_processor: Last5Observations
blocklist:
- vim
- vi
- emacs
- nano
- nohup
- gdb
blocklist_error_template: |
  Interactive operation '{name}' is not supported by this environment.
  Please consider using one of the interactive commands available to you in this environment.
summarizer_config:
  function: SimpleSummarizer
  window_length: 100

# Worker Orchestrator Configuration

worker_router:
  host: "0.0.0.0"
  port: 12345
  max_workers: 10
  worker_timeout: 1800  # 30 minutes

redis:
  host: "localhost"
  port: 6379
  db: 0
  # password loaded from .env

llm:
  default_endpoint: "http://127.0.0.1:8001"
  default_model: "Qwen/Qwen2.5-7B-Instruct"
  default_temperature: 0.7
  default_max_tokens: 512

docker:
  max_memory_per_container: "2g"
  max_cpus_per_container: 1.0
  network_mode: "bridge"

logging:
  level: "INFO"
  log_dir: "logs"
  log_file: "worker_router.log"

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - ++data.train_data=['./test_data.parquet']
    - ++data.val_data=null
    - ++trainer.algorithm.name=grpo
    - ++trainer.algorithm.advantage_estimator=rloo
    - ++trainer.algorithm.kl_coef=0.0
    - ++trainer.algorithm.entropy_coef=0.0
    - ++trainer.algorithm.normalize_advantage=False
    - ++trainer.train_batch_size=1
    - ++trainer.policy_mini_batch_size=1
    - ++trainer.rollout_batch_size=1
    - ++trainer.rollouts_per_task=2
    - ++trainer.learning_rate=1e-6
    - ++trainer.epochs=1
    - ++trainer.eval_interval=-1
    - ++trainer.checkpoint_dir=/home/oldjeff01/checkpoints/vulrl_test
    - ++trainer.save_interval=100
    - ++trainer.policy.model.path=/mnt/e/models/qwen2.5-1.5b
    - ++trainer.policy.model.lora.rank=8
    - ++trainer.policy.model.lora.alpha=16
    - ++trainer.policy.model.lora.dropout=0.05
    - ++trainer.policy.model.lora.target_modules=all-linear
    - ++trainer.placement.colocate_all=true
    - ++trainer.placement.policy_num_nodes=1
    - ++trainer.placement.policy_num_gpus_per_node=1
    - ++trainer.placement.ref_num_nodes=1
    - ++trainer.placement.ref_num_gpus_per_node=1
    - ++trainer.placement.critic_num_nodes=1
    - ++trainer.placement.critic_num_gpus_per_node=1
    - ++trainer.placement.reward_num_nodes=1
    - ++trainer.placement.reward_num_gpus_per_node=1
    - ++generator.num_inference_engines=1
    - ++generator.inference_backend=vllm
    - ++generator.inference_engine_tensor_parallel_size=1
    - ++generator.gpu_memory_utilization=0.5
    - ++generator.max_turns=10
    - +generator.engine_init_kwargs.max_model_len=4096
    - ++dispatcher.strategy=async_pipeline
    - ++logging.backend=local
  job:
    name: main_training
    chdir: null
    override_dirname: ++data.train_data=['./test_data.parquet'],++data.val_data=null,++dispatcher.strategy=async_pipeline,++generator.gpu_memory_utilization=0.5,++generator.inference_backend=vllm,++generator.inference_engine_tensor_parallel_size=1,++generator.max_turns=10,++generator.num_inference_engines=1,++logging.backend=local,++trainer.algorithm.advantage_estimator=rloo,++trainer.algorithm.entropy_coef=0.0,++trainer.algorithm.kl_coef=0.0,++trainer.algorithm.name=grpo,++trainer.algorithm.normalize_advantage=False,++trainer.checkpoint_dir=/home/oldjeff01/checkpoints/vulrl_test,++trainer.epochs=1,++trainer.eval_interval=-1,++trainer.learning_rate=1e-6,++trainer.placement.colocate_all=true,++trainer.placement.critic_num_gpus_per_node=1,++trainer.placement.critic_num_nodes=1,++trainer.placement.policy_num_gpus_per_node=1,++trainer.placement.policy_num_nodes=1,++trainer.placement.ref_num_gpus_per_node=1,++trainer.placement.ref_num_nodes=1,++trainer.placement.reward_num_gpus_per_node=1,++trainer.placement.reward_num_nodes=1,++trainer.policy.model.lora.alpha=16,++trainer.policy.model.lora.dropout=0.05,++trainer.policy.model.lora.rank=8,++trainer.policy.model.lora.target_modules=all-linear,++trainer.policy.model.path=/mnt/e/models/qwen2.5-1.5b,++trainer.policy_mini_batch_size=1,++trainer.rollout_batch_size=1,++trainer.rollouts_per_task=2,++trainer.save_interval=100,++trainer.train_batch_size=1,+generator.engine_init_kwargs.max_model_len=4096
    id: ???
    num: ???
    config_name: ppo_base_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /mnt/e/git_fork_folder/VulRL/SkyRL/skyrl-train/vulrl_inside_skyrl
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /mnt/e/git_fork_folder/VulRL/SkyRL/skyrl-train/skyrl_train/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /mnt/e/git_fork_folder/VulRL/SkyRL/skyrl-train/vulrl_inside_skyrl/outputs/2026-02-13/11-17-07
    choices:
      skyrl_gym_config: default
      megatron_config@trainer.ref.megatron_config: ref
      megatron_config@trainer.policy.megatron_config: policy
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
